version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/api/event-types"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 5s
