name: Test Coverage

on:
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  check-changes:
    name: Check for changes since last run
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.compare.outputs.has_changes }}
    steps:
      - name: Compare HEAD to last successful run
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WORKFLOW_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq '.workflow_id')
          LAST_SHA=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].head_sha // ""')
          echo "Last successful SHA: $LAST_SHA"
          echo "Current SHA: ${{ github.sha }}"
          if [ "$LAST_SHA" = "${{ github.sha }}" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  frontend-coverage:
    name: Frontend Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: frontend/coverage/
          retention-days: 30

  backend-coverage:
    name: Backend Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Generate API types
        working-directory: api
        run: npm ci && npx tsp compile . --output-dir generated

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.run_id }}
          path: backend/build/reports/jacoco/test/html/
          retention-days: 30

  publish-pages:
    name: Publish Coverage to GitHub Pages
    runs-on: ubuntu-latest
    needs: [check-changes, frontend-coverage, backend-coverage]
    if: needs.check-changes.outputs.has_changes == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: site/frontend

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-${{ github.run_id }}
          path: site/backend

      - name: Create index page
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          cat > site/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Coverage Reports</title>
          <style>body{font-family:sans-serif;max-width:600px;margin:4rem auto}a{display:block;margin:1rem 0;font-size:1.2rem}</style>
          </head>
          <body>
          <h1>Coverage Reports &mdash; ${DATE}</h1>
          <a href="frontend/index.html">Frontend (Vitest / v8)</a>
          <a href="backend/index.html">Backend (JaCoCo)</a>
          </body>
          </html>
          EOF

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
